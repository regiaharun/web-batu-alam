<!DOCTYPE html>
<html>
<head>
    <title>Form Pemesanan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Form Pemesanan</h1>

    <form onsubmit="kirimWA(); return false;">
        <input type="text" id="nama" placeholder="Nama" required><br><br>
        
        <input type="text" id="produk" placeholder="Nama Produk" required><br><br>
        
        <input type="number" id="jumlah" placeholder="Jumlah" required><br><br>
        
        <button type="submit">Pesan Sekarang</button>
    </form>

    <script>
        function kirimWA() {
            var nama = document.getElementById("nama").value;
            var produk = document.getElementById("produk").value;
            var jumlah = document.getElementById("jumlah").value;

            var url = "https://wa.me/6285702132022?text="
                + "Nama: " + nama + "%0A"
                + "Produk: " + produk + "%0A"
                + "Jumlah: " + jumlah;

            window.open(url, '_blank');
        }
    </script>

</body>

        <a href="index.html">Home</a>
        <a href="katalog.html">Katalog</a>
        <a href="pesan.html">Pesan</a>
    </div>
</html>
